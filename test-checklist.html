<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masari — Testing Checklist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    padding: 16px; padding-bottom: 100px;
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 24px; color: #A3FF3C; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 14px; margin-bottom: 20px; }
  .progress-bar-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1a1a1a; border-top: 1px solid #2a2a2a;
    padding: 12px 16px; z-index: 100;
    display: flex; align-items: center; gap: 12px;
  }
  .progress-bar-bg {
    flex: 1; height: 10px; background: #2a2a2a; border-radius: 5px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: #A3FF3C; border-radius: 5px;
    transition: width 0.3s ease;
  }
  .progress-text { font-size: 14px; color: #A3FF3C; font-weight: 600; white-space: nowrap; min-width: 70px; text-align: right; }
  .section {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
    margin-bottom: 12px; overflow: hidden;
  }
  .section-header {
    padding: 14px 16px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center;
    user-select: none; -webkit-user-select: none;
  }
  .section-header:active { background: #222; }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-count {
    font-size: 13px; color: #888; background: #252525;
    padding: 2px 10px; border-radius: 20px;
  }
  .section-count.done { color: #A3FF3C; background: #1a2a10; }
  .section-body { display: none; padding: 0 16px 12px; }
  .section.open .section-body { display: block; }
  .section-header .arrow { color: #666; font-size: 12px; transition: transform 0.2s; margin-right: 8px; }
  .section.open .arrow { transform: rotate(90deg); }
  .subsection { font-size: 13px; font-weight: 600; color: #A3FF3C; margin: 12px 0 6px; padding-top: 8px; border-top: 1px solid #222; }
  .subsection:first-child { border-top: none; margin-top: 4px; }
  .item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #1f1f1f;
    cursor: pointer; user-select: none; -webkit-user-select: none;
  }
  .item:last-child { border-bottom: none; }
  .item:active { background: #222; margin: 0 -16px; padding: 8px 16px; }
  .check {
    width: 22px; height: 22px; min-width: 22px; border: 2px solid #444;
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.15s;
  }
  .item.checked .check { background: #A3FF3C; border-color: #A3FF3C; }
  .item.checked .check::after { content: '✓'; color: #000; font-size: 14px; font-weight: 700; }
  .item.checked .label { color: #666; text-decoration: line-through; }
  .label { font-size: 14px; line-height: 1.5; }
  .reset-btn {
    display: block; margin: 20px auto; padding: 10px 24px;
    background: #2a2a2a; color: #FF4444; border: 1px solid #444;
    border-radius: 8px; font-size: 14px; cursor: pointer;
  }
  .reset-btn:active { background: #3a1a1a; }
  .tip { font-size: 12px; color: #666; margin: 4px 0 0 32px; }
  @media (min-width: 700px) {
    body { max-width: 700px; margin: 0 auto; padding: 32px; padding-bottom: 100px; }
    h1 { font-size: 28px; }
    .item:hover { background: #1e1e1e; margin: 0 -16px; padding: 8px 16px; border-radius: 8px; }
  }
</style>
</head>
<body>

<button class="reset-btn" onclick="if(confirm('Reset all checkboxes?')){localStorage.removeItem('masari_test');location.reload()}">Reset All Checkboxes</button>

  <div class="progress-bar-bg"><div class="progress-bar-fill" id="pbar"></div></div>
  <div class="progress-text" id="ptext">0 / 0</div>
</div>

let state = JSON.parse(localStorage.getItem('masari_test') || '{}');
const app = document.getElementById('app');

let totalItems = 0;
let totalChecked = 0;

DATA.forEach((section, si) => {
  const div = document.createElement('div');
  div.className = 'section' + (state['open_' + si] ? ' open' : '');

  const items = section.items.filter(i => typeof i === 'string');
  const checked = items.filter((_, ii) => state[si + '_' + ii]).length;
  totalItems += items.length;
  totalChecked += checked;

  const allDone = checked === items.length && items.length > 0;

  div.innerHTML = `
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="arrow">▶</span>
        <span class="section-title">${section.title}</span>
      </div>
      <span class="section-count ${allDone ? 'done' : ''}">${checked} / ${items.length}</span>
    </div>
    <div class="section-body"></div>
  `;

  const header = div.querySelector('.section-header');
  const body = div.querySelector('.section-body');

  header.addEventListener('click', () => {
    div.classList.toggle('open');
    state['open_' + si] = div.classList.contains('open');
    save();
  });

  let itemIndex = 0;
  section.items.forEach(item => {
    if (typeof item === 'object' && item.sub) {
      const s = document.createElement('div');
      s.className = 'subsection';
      s.textContent = item.sub;
      body.appendChild(s);
      return;
    }

    const ii = itemIndex++;
    const row = document.createElement('div');
    row.className = 'item' + (state[si + '_' + ii] ? ' checked' : '');
    row.innerHTML = `<div class="check"></div><div class="label">${item}</div>`;
    row.addEventListener('click', () => {
      const key = si + '_' + ii;
      state[key] = !state[key];
      row.classList.toggle('checked');
      save();
      updateProgress();
      updateSectionCount(div, si);
    });
    body.appendChild(row);
  });

  app.appendChild(div);
});

function updateSectionCount(div, si) {
  const items = DATA[si].items.filter(i => typeof i === 'string');
  const checked = items.filter((_, ii) => state[si + '_' + ii]).length;
  const span = div.querySelector('.section-count');
  span.textContent = checked + ' / ' + items.length;
  if (checked === items.length && items.length > 0) span.classList.add('done');
  else span.classList.remove('done');
}

function updateProgress() {
  let t = 0, c = 0;
  DATA.forEach((section, si) => {
    const items = section.items.filter(i => typeof i === 'string');
    t += items.length;
    c += items.filter((_, ii) => state[si + '_' + ii]).length;
  });
  const pct = t > 0 ? Math.round((c / t) * 100) : 0;
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('ptext').textContent = c + ' / ' + t + ' (' + pct + '%)';
}

function save() { localStorage.setItem('masari_test', JSON.stringify(state)); }

updateProgress();
</script>

</html>
